<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
}

#reader{
width:300px;
margin:auto;
}
</style>

</head>
<body>

<h2>IMS Scanner</h2>

<div id="reader"></div>

<script>

const GAS_URL = "PASTE_WEBAPP_URL_DISINI";

function onScanSuccess(code){

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({
code:code
})
});

alert("Scanned: "+code);

}

new Html5Qrcode("reader").start(
{ facingMode:"environment" },
{
fps:10,
qrbox:250
},
onScanSuccess
);

</script>

</body>
</html>
