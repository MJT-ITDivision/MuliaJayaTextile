<!DOCTYPE html>
<html>
<head>
    <title>MJT Smart Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        #reader { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            border: none !important;
        }
        /* Custom UI untuk mempercantik tampilan di dalam Iframe */
        #reader__scan_region { background: #000; }
        #reader__dashboard { padding: 20px !important; background: #1a1a1a; }
        
        .info-box {
            padding: 15px;
            background: rgba(255,255,255,0.1);
            margin: 10px;
            border-radius: 8px;
        }
        h2 { font-size: 1.1rem; margin-bottom: 5px; color: #00ff88; }
        p { font-size: 0.85rem; margin: 5px 0; opacity: 0.8; }
        .status-success { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="info-box">
    <h2 id="title-petugas">Scanner Aktif</h2>
    <p id="status">Menginisialisasi kamera...</p>
</div>

<div id="reader"></div>

<script>
    const statusEl = document.getElementById('status');
    const titleEl = document.getElementById('title-petugas');
    let qrScanner = null;

    // 1. Ambil Parameter dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const GAS_URL = urlParams.get('gas_url');
    const petugas = urlParams.get('petugas') || "Petugas";
    const isEmbed = urlParams.get('embed') === 'true';

    titleEl.textContent = `Petugas: ${petugas}`;

    if (!GAS_URL && !isEmbed) {
        statusEl.textContent = "ERROR: Konfigurasi URL tidak lengkap.";
        statusEl.style.color = '#ff4444';
    } else {
        // Mulai Scanner
        qrScanner = new Html5Qrcode("reader");
        startScanner();
    }

    function startScanner() {
        const config = { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        qrScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess
        ).then(() => {
            statusEl.textContent = "Kamera Ready - Dekatkan ke Barcode";
        }).catch((err) => {
            statusEl.textContent = "Gagal akses kamera. Pastikan izin diberikan.";
            statusEl.style.color = '#ffbb00';
        });
    }

    function onScanSuccess(decodedText) {
            // 1. Matikan kamera segera agar tidak berat (PENTING!)
            if (qrScanner) qrScanner.pause(true);
            
            // 2. Tampilkan status terdeteksi
            statusEl.innerHTML = `<span class="status-success">TERDETEKSI: ${decodedText}</span>`;
            
            // 3. KIRIM DATA INSTAN VIA "KABEL" INTERNAL (Tanpa Internet/Fetch)
            window.parent.postMessage({
                type: 'scan_result',
                code: decodedText
            }, '*'); 
        
            // 4. Jika mode Tab Baru (bukan Iframe), baru jalankan fetch sebagai backup
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('embed') !== 'true') {
                // Logika fetch lama hanya jika di luar iframe
                console.log("Mode tab baru, menjalankan backup fetch...");
            }
        }
</script>

</body>
</html>
